# Onboard configuration for bazel-firecracker platform
# Fill in your project-specific values and run: make onboard CONFIG=onboard.yaml
# See examples/ for complete configurations for each use case.

platform:
  gcp_project: "my-project"
  region: "us-central1"
  zone: "us-central1-a"

microvm:
  vcpus: 4
  memory_mb: 8192
  max_per_host: 16
  idle_target: 2

hosts:
  machine_type: "n2-standard-64"
  min_count: 2
  max_count: 20
  data_disk_gb: 500

# workload: required when ci.system is "none" (AI sandbox, dev env, serverless).
# Ignored when ci.system is "github-actions".
# workload:
#   # snapshot_commands lists warmup steps baked into the golden snapshot.
#   # Types: "shell" | "git-clone" | "gcp-auth" (see examples/README.md for args)
#   snapshot_commands:
#     - type: "shell"
#       args: ["pip3", "install", "-r", "/app/requirements.txt"]
#       run_as_root: true
#   # start_command: the service the VM runs after restore.
#   # thaw-agent starts command, waits for GET health_path on port to return 2xx.
#   start_command:
#     command: ["python3", "/app/server.py"]
#     port: 8080
#     health_path: "/health"

# session: optional, for workloads that persist state across requests.
# session:
#   enabled: true
#   ttl_seconds: 3600   # auto-pause after 1h idle
#   auto_pause: true    # pause to GCS (true) vs destroy (false)

# ci: add-on for CI system integration. Default: "none" (generic VM host).
ci:
  system: "none"        # "github-actions" | "none"
  # github:             # only used when system == "github-actions"
  #   repo: "myorg/myrepo"
  #   org: "myorg"      # org-level runner registration (optional; overrides repo)
  #   labels:
  #     - "self-hosted"
  #     - "firecracker"
  #     - "bazel"
  #   ephemeral: true

# bazel: add-on for Bazel-specific snapshot warmup (ci.system: github-actions).
# bazel:
#   warmup_targets: "//..."
#   repo_cache_upper_size_gb: 10
#   git_cache:
#     enabled: false
#     repos: {}          # {"github.com/myorg/myrepo": "myrepo"}
#     workspace_dir: ""  # defaults to /mnt/ephemeral/workspace
#   buildbarn:
#     certs_dir: ""      # host path to Buildbarn mTLS certs

# repository: required when snapshot uses git-clone, or when ci.system is github-actions.
# repository:
#   url: "https://github.com/myorg/myrepo"
#   branch: "main"
#   github_app_id: ""
#   github_app_secret_name: ""  # GCP Secret Manager reference

credentials:
  secrets: []
  host_dirs: []
  env: {}
