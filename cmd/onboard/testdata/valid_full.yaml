platform:
  gcp_project: my-project
  region: us-west1
  zone: us-west1-b
repository:
  url: https://github.com/org/repo
  branch: develop
  github_app_id: "12345"
  github_app_secret_name: github-app-key
bazel:
  warmup_targets: //src/...
microvm:
  vcpus: 8
  memory_mb: 16384
  max_per_host: 8
  idle_target: 4
hosts:
  machine_type: n2-standard-128
  min_count: 5
  max_count: 50
  data_disk_gb: 1000
ci:
  system: github-actions
  github:
    repo: org/repo
    labels:
      - self-hosted
      - firecracker
    ephemeral: true
