name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.24'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      migrations: ${{ steps.filter.outputs.migrations }}
      python_sdk: ${{ steps.filter.outputs.python_sdk }}
      workflows: ${{ steps.filter.outputs.workflows }}
      helm: ${{ steps.filter.outputs.helm }}
      examples: ${{ steps.filter.outputs.examples }}
      contract: ${{ steps.filter.outputs.contract }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
            migrations:
              - 'cmd/capsule-control-plane/migrations/**'
              - 'cmd/capsule-control-plane/schema.sql'
              - '.github/scripts/check-migrations.sh'
            python_sdk:
              - 'sdk/python/**'
            workflows:
              - '.github/workflows/**'
              - '.github/scripts/**'
            helm:
              - 'deploy/helm/**'
            examples:
              - 'examples/**'
              - 'cmd/onboard/**'
            contract:
              - 'sdk/python/**'
              - 'cmd/capsule-control-plane/**'
              - 'cmd/capsule-manager/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'

  fmt:
    name: Format
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted with gofmt:"
            echo "$unformatted"
            echo ""
            echo "Run: gofmt -w ."
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod or go.sum is out of date. Run: go mod tidy"
            git diff go.mod go.sum
            exit 1
          fi

  migration-guard:
    name: Migration Guard
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check migration changes
        run: bash .github/scripts/check-migrations.sh --ci

  vet:
    name: Vet
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go vet ./...

  lint:
    name: Lint
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout 5m

  test:
    name: Test
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./pkg/... ./cmd/...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 30

  build:
    name: Build
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # for git describe

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build all binaries
        run: |
          make build
          echo "Built binaries:"
          ls -lh bin/

      - name: Verify binaries
        run: |
          for bin in bin/*; do
            file "$bin"
          done

  sdk-python:
    name: Python SDK
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.python_sdk == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SDK dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check src/capsule_sdk/ tests/
      - name: Pyright
        run: python -m pyright src/capsule_sdk/
      - name: Pytest
        run: python -m pytest tests/ -v --ignore=tests/e2e_live.py -m "not contract"

  workflow-lint:
    name: Workflow Lint
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-actionlint@v1

  helm-lint:
    name: Helm Lint
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/capsule

  example-validation:
    name: Validate Examples
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.examples == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test -v -run TestExampleConfigs ./cmd/onboard/...

  contract-tests:
    name: SDK Contract Tests
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.contract == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: capsule
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and start control plane
        run: |
          go build -o /tmp/capsule-control-plane ./cmd/capsule-control-plane
          /tmp/capsule-control-plane \
            --db-host=localhost --db-port=5432 \
            --db-user=postgres --db-password=postgres \
            --db-name=capsule \
            --api-auth-token=test-token > /tmp/capsule-control-plane.log 2>&1 &
          for _i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8080/health || { echo "Control plane failed to start"; cat /tmp/capsule-control-plane.log; exit 1; }
      - name: Run contract tests
        run: |
          cd sdk/python
          pip install -e ".[dev]"
          CAPSULE_BASE_URL=http://localhost:8080 CAPSULE_TOKEN=test-token \
            python -m pytest tests/test_contract.py -v -m contract
