name: E2E Canary Health Check

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch: {}

jobs:
  canary:
    runs-on: [self-hosted, firecracker]
    timeout-minutes: 10
    steps:
      - name: Check Bazel version
        id: bazel-version
        run: |
          bazel version
          echo "bazel_available=true" >> $GITHUB_OUTPUT

      - name: Check Bazel server
        id: bazel-server
        run: |
          bazel info server_pid
          echo "server_running=true" >> $GITHUB_OUTPUT

      - name: Report success
        if: success()
        run: |
          CONTROL_PLANE="${CONTROL_PLANE_URL:-}"
          if [ -n "$CONTROL_PLANE" ]; then
            curl -s -X POST "${CONTROL_PLANE}/api/v1/canary/report" \
              -H "Content-Type: application/json" \
              -d "{\"status\":\"success\",\"runner\":\"$RUNNER_NAME\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
              || echo "Warning: Failed to report canary success"
          fi

      - name: Report failure
        if: failure()
        run: |
          CONTROL_PLANE="${CONTROL_PLANE_URL:-}"
          if [ -n "$CONTROL_PLANE" ]; then
            curl -s -X POST "${CONTROL_PLANE}/api/v1/canary/report" \
              -H "Content-Type: application/json" \
              -d "{\"status\":\"failure\",\"runner\":\"$RUNNER_NAME\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
              || echo "Warning: Failed to report canary failure"
          fi
