syntax = "proto3";

package runner;

option go_package = "github.com/rahul-roy-glean/capsule/api/proto/runner";

import "google/protobuf/timestamp.proto";

// HostAgent service runs on each Firecracker host VM
service HostAgent {
  // AllocateRunner allocates a new runner on this host
  rpc AllocateRunner(AllocateRunnerRequest) returns (AllocateRunnerResponse);
  
  // ReleaseRunner releases a runner back to the pool or destroys it
  rpc ReleaseRunner(ReleaseRunnerRequest) returns (ReleaseRunnerResponse);
  
  // GetHostStatus returns the current status of the host
  rpc GetHostStatus(GetHostStatusRequest) returns (HostStatus);
  
  // Heartbeat sends a heartbeat to the control plane
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  
  // ListRunners lists all runners on this host
  rpc ListRunners(ListRunnersRequest) returns (ListRunnersResponse);
  
  // GetRunner gets details about a specific runner
  rpc GetRunner(GetRunnerRequest) returns (Runner);

  // QuarantineRunner isolates a runner for debugging (e.g. block egress, pause VM)
  rpc QuarantineRunner(QuarantineRunnerRequest) returns (QuarantineRunnerResponse);

  // UnquarantineRunner removes isolation and optionally resumes a paused runner
  rpc UnquarantineRunner(UnquarantineRunnerRequest) returns (UnquarantineRunnerResponse);

  // PauseRunner snapshots a runner's session and suspends the VM
  rpc PauseRunner(PauseRunnerRequest) returns (PauseRunnerResponse);

  // ResumeRunner restores a runner from a session snapshot
  rpc ResumeRunner(ResumeRunnerRequest) returns (ResumeRunnerResponse);

  // UpdateNetworkPolicy updates the network policy for a running VM
  rpc UpdateNetworkPolicy(UpdateNetworkPolicyRequest) returns (UpdateNetworkPolicyResponse);

  // GetNetworkPolicy returns the effective network policy for a runner
  rpc GetNetworkPolicy(GetNetworkPolicyRequest) returns (GetNetworkPolicyResponse);
}

// ControlPlane service runs in GKE
service ControlPlane {
  // GetRunner requests a runner from the pool
  rpc GetRunner(GetRunnerRequest) returns (GetRunnerResponse);
  
  // ReleaseRunner releases a runner
  rpc ReleaseRunner(ReleaseRunnerRequest) returns (ReleaseRunnerResponse);
  
  // RegisterHost registers a new host with the control plane
  rpc RegisterHost(RegisterHostRequest) returns (RegisterHostResponse);
  
  // HostHeartbeat receives heartbeats from hosts
  rpc HostHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  
  // GetSnapshot gets the current snapshot version
  rpc GetSnapshot(GetSnapshotRequest) returns (Snapshot);
}

// Runner states
enum RunnerState {
  RUNNER_STATE_UNSPECIFIED = 0;
  RUNNER_STATE_COLD = 1;
  RUNNER_STATE_BOOTING = 2;
  RUNNER_STATE_INITIALIZING = 3;
  RUNNER_STATE_IDLE = 4;
  RUNNER_STATE_BUSY = 5;
  RUNNER_STATE_DRAINING = 6;
  RUNNER_STATE_QUARANTINED = 7;
  RUNNER_STATE_RETIRING = 8;
  RUNNER_STATE_TERMINATED = 9;
  RUNNER_STATE_PAUSED = 10;      // VM paused and pooled for reuse
  RUNNER_STATE_PAUSING = 11;     // snapshot in progress
  RUNNER_STATE_SUSPENDED = 12;   // VM destroyed, session snapshot exists
}

// Host states
enum HostState {
  HOST_STATE_UNSPECIFIED = 0;
  HOST_STATE_STARTING = 1;
  HOST_STATE_READY = 2;
  HOST_STATE_DRAINING = 3;
  HOST_STATE_UNHEALTHY = 4;
}

// Resources requested for a runner
message Resources {
  int32 vcpus = 1;
  int32 memory_mb = 2;
  int32 disk_gb = 3;
}

// Runner represents a single runner instance
message Runner {
  string id = 1;
  string host_id = 2;
  RunnerState state = 3;
  string internal_ip = 4;
  reserved 5;
  reserved "external_runner_id";
  string job_id = 6;
  string snapshot_version = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp started_at = 9;
  Resources resources = 10;
}

// HostStatus represents the current status of a host
message HostStatus {
  string host_id = 1;
  string instance_name = 2;
  string zone = 3;
  HostState state = 4;
  int32 total_slots = 5;
  int32 used_slots = 6;
  int32 idle_runners = 7;
  int32 busy_runners = 8;
  double cpu_usage = 9;
  double memory_usage = 10;
  double disk_usage = 11;
  string snapshot_version = 12;
  google.protobuf.Timestamp snapshot_synced_at = 13;
  google.protobuf.Timestamp last_heartbeat = 14;
  // Pool statistics
  PoolStats pool_stats = 15;
}

// PoolStats contains runner pool statistics
message PoolStats {
  int32 pooled_runners = 1;
  int32 max_runners = 2;
  int64 memory_usage_bytes = 3;
  int64 max_memory_bytes = 4;
  int64 pool_hits = 5;
  int64 pool_misses = 6;
  int64 evictions = 7;
  int64 recycle_failures = 8;
}

// Snapshot represents a snapshot version
message Snapshot {
  string version = 1;
  string status = 2;
  string gcs_path = 3;
  reserved 4;
  reserved "build_tool_version";
  string repo_commit = 5;
  int64 size_bytes = 6;
  google.protobuf.Timestamp created_at = 7;
}

// StartCommand defines an arbitrary workload to run inside the VM. This is the
// primary workload model — the VM starts this process and exposes it on the
// specified port.
message StartCommand {
  repeated string command = 1;
  int32 port = 2;
  string health_path = 3;
  map<string, string> env = 4;
  string run_as = 5;
}

// AllocateRunnerRequest
message AllocateRunnerRequest {
  string request_id = 1;
  reserved 2, 3, 4;
  reserved "repo", "branch", "commit";
  Resources resources = 5;
  map<string, string> labels = 6;
  reserved 7, 8;
  reserved "github_runner_token", "ci_runner_token";
  reserved 9;
  reserved "integration_name";
  string workload_key = 10;       // Hash of snapshot commands; identifies which snapshot to boot
  StartCommand start_command = 11; // Optional: user service to start inside the VM
  string session_id = 12;         // optional: bind to session for pause/resume
  string snapshot_version = 13;   // Explicit version to use; skips current-pointer.json lookup
  int32 ttl_seconds = 14;         // idle timeout from snapshot config (0 = no timeout)
  bool auto_pause = 15;           // pause on TTL expiry instead of destroy
  string snapshot_tag = 16;       // optional: named tag to resolve snapshot version
  string network_policy_preset = 17; // optional: named preset (e.g., "restricted-egress", "agent-sandbox")
  string network_policy_json = 18;   // optional: full NetworkPolicy as JSON (overrides preset)
}

// AllocateRunnerResponse
message AllocateRunnerResponse {
  Runner runner = 1;
  string error = 2;
  bool resumed = 3;          // true if restored from session snapshot
  string session_id = 4;     // session_id (echoed back or generated)
}

// ReleaseRunnerRequest
message ReleaseRunnerRequest {
  string runner_id = 1;
  bool destroy = 2;
  // try_recycle attempts to pause and pool the runner for reuse
  // Only works if pool is enabled and finished_cleanly is true
  bool try_recycle = 3;
  // finished_cleanly indicates the task completed without errors
  // Required for try_recycle to succeed
  bool finished_cleanly = 4;
}

// ReleaseRunnerResponse
message ReleaseRunnerResponse {
  bool success = 1;
  string error = 2;
}

// GetHostStatusRequest
message GetHostStatusRequest {}

// HeartbeatRequest
message HeartbeatRequest {
  string host_id = 1;
  HostStatus status = 2;
}

// HeartbeatResponse
message HeartbeatResponse {
  bool acknowledged = 1;
  reserved 2, 3;
  reserved "snapshot_version", "should_sync_snapshot";
  bool should_drain = 4;
}

// ListRunnersRequest
message ListRunnersRequest {
  RunnerState state_filter = 1;
}

// ListRunnersResponse
message ListRunnersResponse {
  repeated Runner runners = 1;
}

// GetRunnerRequest
message GetRunnerRequest {
  string runner_id = 1;
}

// GetRunnerResponse
message GetRunnerResponse {
  Runner runner = 1;
  string host_address = 2;
  string error = 3;
}

message QuarantineRunnerRequest {
  string runner_id = 1;
  string reason = 2;
  bool block_egress = 3;
  bool pause_vm = 4;
}

message QuarantineRunnerResponse {
  bool success = 1;
  string error = 2;
  string quarantine_dir = 3;
}

message UnquarantineRunnerRequest {
  string runner_id = 1;
  bool unblock_egress = 2;
  bool resume_vm = 3;
}

message UnquarantineRunnerResponse {
  bool success = 1;
  string error = 2;
}

// RegisterHostRequest
message RegisterHostRequest {
  string instance_name = 1;
  string zone = 2;
  int32 total_slots = 3;
  string snapshot_version = 4;
}

// RegisterHostResponse
message RegisterHostResponse {
  string host_id = 1;
  string snapshot_version = 2;
}

// GetSnapshotRequest
message GetSnapshotRequest {
  string version = 1;
}

// TriggerSnapshotBuildRequest (deprecated — fields reserved)
message TriggerSnapshotBuildRequest {
  reserved 1, 2, 3;
  reserved "repo", "branch", "build_tool_version";
}

// TriggerSnapshotBuildResponse (deprecated — fields reserved)
message TriggerSnapshotBuildResponse {
  reserved 1, 2;
  reserved "build_id", "status";
}

message PauseRunnerRequest {
  string runner_id = 1;
}

message PauseRunnerResponse {
  bool success = 1;
  string error = 2;
  string session_id = 3;
  int64 snapshot_size_bytes = 4;
  int32 layer = 5;
}

message ResumeRunnerRequest {
  string session_id = 1;
  string workload_key = 2;
  int32 ttl_seconds = 3;
  bool auto_pause = 4;
  string network_policy_preset = 5;
  string network_policy_json = 6;
}

message ResumeRunnerResponse {
  Runner runner = 1;
  string error = 2;
  bool resumed_from_session = 3;
}

message UpdateNetworkPolicyRequest {
  string runner_id = 1;
  string network_policy_json = 2; // Full NetworkPolicy as JSON (full replace)
}

message UpdateNetworkPolicyResponse {
  bool success = 1;
  string error = 2;
  int32 version = 3;
}

message GetNetworkPolicyRequest {
  string runner_id = 1;
}

message GetNetworkPolicyResponse {
  string network_policy_json = 1;  // Effective policy as JSON
  int32 version = 2;
  bool emergency_egress_blocked = 3;
}