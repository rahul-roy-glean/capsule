# Cloud Build config for building git-cache.img
# 
# This build:
# 1. Clones configured repos
# 2. Packages them into git-cache.img
# 3. Uploads to GCS
#
# Trigger:
# - On schedule (Cloud Scheduler → Pub/Sub → Cloud Build)
# - Manual via: gcloud builds submit --config=deploy/cloudbuild/git-cache-build.yaml
# - Via freshness checker when stale
#
# Required substitutions:
# - _GCS_BUCKET: GCS bucket for git-cache storage
# - _REPOS: Comma-separated repo specs (github.com/org/repo:name)
# - _IMAGE_SIZE_GB: Size of git-cache.img (default: 100)

substitutions:
  _GCS_BUCKET: ''
  _REPOS: ''  # Required: e.g. 'github.com/org/repo:name'
  _IMAGE_SIZE_GB: '100'

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 200  # Need space for cloning + image
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build the git-cache-builder binary
  - name: 'golang:1.24'
    id: 'build-tool'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        go build -o /workspace/git-cache-builder ./cmd/git-cache-builder

  # Run git-cache-builder
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'build-cache'
    entrypoint: 'bash'
    env:
      - 'GITHUB_TOKEN=$_GITHUB_TOKEN'
    secretEnv: ['GITHUB_TOKEN']
    args:
      - '-c'
      - |
        # Install git
        apt-get update && apt-get install -y git e2fsprogs

        # Run the builder
        /workspace/git-cache-builder \
          --repos="${_REPOS}" \
          --gcs-bucket="${_GCS_BUCKET}" \
          --image-size-gb=${_IMAGE_SIZE_GB} \
          --output-dir=/workspace/git-cache-output \
          --log-level=info

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-token/versions/latest
      env: 'GITHUB_TOKEN'

timeout: '3600s'  # 1 hour max
