# Cloud Build config for building data snapshot
#
# This creates a GCP disk snapshot containing:
# - Firecracker snapshot artifacts (from GCS)
# - Git cache (pre-cloned repos)
# - git-cache.img block device
#
# The snapshot is then used by hosts for instant boot (~30s vs ~15min with GCS)
#
# Prerequisites:
# - Firecracker snapshot artifacts must exist in GCS (built by snapshot-builder)
# - Cloud Build service account needs compute.disks.* and compute.snapshots.* permissions
#
# Trigger:
# - Manual: gcloud builds submit --config=deploy/cloudbuild/data-snapshot-build.yaml
# - Scheduled via Cloud Scheduler
# - Via freshness checker when stale

substitutions:
  _ZONE: 'us-central1-a'
  _REGION: 'us-central1'
  _DISK_SIZE_GB: '200'
  _REPOS: 'github.com/askscio/scio:scio'
  _GIT_CACHE_SIZE_GB: '100'
  _SNAPSHOT_PREFIX: 'runner-data'

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 50
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build the data-snapshot-builder binary
  - name: 'golang:1.22'
    id: 'build-tool'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        go build -o /workspace/data-snapshot-builder ./cmd/data-snapshot-builder

  # Create a temporary VM to run the builder
  # (Cloud Build workers can't attach disks, so we need a separate VM)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'create-build-vm'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud compute instances create snapshot-builder-${BUILD_ID:0:8} \
          --project=${PROJECT_ID} \
          --zone=${_ZONE} \
          --machine-type=n2-standard-8 \
          --image-family=ubuntu-2204-lts \
          --image-project=ubuntu-os-cloud \
          --boot-disk-size=100GB \
          --scopes=cloud-platform \
          --metadata=startup-script='#!/bin/bash
            apt-get update && apt-get install -y git'
        
        # Wait for VM to be ready
        sleep 60

  # Copy builder binary and run it on the VM
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'run-builder'
    entrypoint: 'bash'
    env:
      - 'GITHUB_TOKEN=$_GITHUB_TOKEN'
    secretEnv: ['GITHUB_TOKEN']
    args:
      - '-c'
      - |
        VM_NAME="snapshot-builder-${BUILD_ID:0:8}"
        
        # Copy binary to VM
        gcloud compute scp /workspace/data-snapshot-builder ${VM_NAME}:/tmp/data-snapshot-builder \
          --project=${PROJECT_ID} --zone=${_ZONE}
        
        # Run the builder on the VM
        gcloud compute ssh ${VM_NAME} --project=${PROJECT_ID} --zone=${_ZONE} --command="
          chmod +x /tmp/data-snapshot-builder
          sudo /tmp/data-snapshot-builder \
            --project=${PROJECT_ID} \
            --zone=${_ZONE} \
            --region=${_REGION} \
            --disk-size-gb=${_DISK_SIZE_GB} \
            --snapshot-gcs=gs://${PROJECT_ID}-firecracker-snapshots/current/ \
            --repos='${_REPOS}' \
            --git-cache-img-size-gb=${_GIT_CACHE_SIZE_GB} \
            --snapshot-prefix=${_SNAPSHOT_PREFIX} \
            --metadata-bucket=${PROJECT_ID}-firecracker-snapshots \
            --github-token='${GITHUB_TOKEN}' \
            --log-level=info
        "

  # Cleanup: Delete the build VM
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'cleanup-vm'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud compute instances delete snapshot-builder-${BUILD_ID:0:8} \
          --project=${PROJECT_ID} --zone=${_ZONE} --quiet || true

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-token/versions/latest
      env: 'GITHUB_TOKEN'

timeout: '3600s'  # 1 hour max
