apiVersion: v1
kind: Service
metadata:
  name: {{ include "capsule.fullname" . }}
  namespace: {{ include "capsule.namespace" . }}
  labels:
{{ include "capsule.labels" . | indent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
{{ include "capsule.selectorLabels" . | indent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.service.ports.grpc }}
      targetPort: grpc
    - name: http
      port: {{ .Values.service.ports.http }}
      targetPort: http


