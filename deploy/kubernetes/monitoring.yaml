# Canonical Cloud Monitoring dashboard catalog for Firecracker Runner.
# The previous Prometheus/Grafana manifests that lived here had drifted badly
# from the metrics the system actually emits today via OpenTelemetry.
#
# These JSON payloads are intended to be the source of truth for dashboards we
# can import into GCP Cloud Monitoring or translate into Terraform
# `google_monitoring_dashboard` resources.
#
# Example import flow:
#   kubectl -n firecracker-runner get configmap cloud-monitoring-dashboard-catalog \
#     -o jsonpath='{.data.control-plane-endpoint-health\.json}' > /tmp/control-plane-endpoint-health.json
#   gcloud monitoring dashboards create --config-from-file=/tmp/control-plane-endpoint-health.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-monitoring-dashboard-catalog
  namespace: firecracker-runner
data:
  control-plane-endpoint-health.json: |
    {
      "displayName": "Firecracker Control Plane Endpoint Health",
      "dashboardFilters": [
        {
          "filterType": "VALUE_ONLY",
          "templateVariable": "latency_percentile",
          "valueType": "STRING",
          "stringValue": "95",
          "stringArray": {
            "values": [
              "50",
              "95",
              "99"
            ]
          }
        }
      ],
      "mosaicLayout": {
        "columns": 12,
        "tiles": [
          {
            "xPos": 0,
            "yPos": 0,
            "width": 2,
            "height": 2,
            "widget": {
              "title": "Requests / 5m",
              "scorecard": {
                "timeSeriesQuery": {
                  "timeSeriesFilter": {
                    "filter": "metric.type=\"workload.googleapis.com/control_plane.endpoint.requests\" AND metric.label.service_name=\"control-plane\"",
                    "aggregation": {
                      "alignmentPeriod": "300s",
                      "perSeriesAligner": "ALIGN_DELTA",
                      "crossSeriesReducer": "REDUCE_SUM"
                    }
                  }
                }
              }
            }
          },
          {
            "xPos": 2,
            "yPos": 0,
            "width": 2,
            "height": 2,
            "widget": {
              "title": "5xx / 5m",
