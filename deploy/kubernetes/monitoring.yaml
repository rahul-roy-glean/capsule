                  "timeSeriesFilter": {
                    "filter": "metric.type=\"workload.googleapis.com/control_plane.endpoint.requests\" AND metric.label.service_name=\"control-plane\" AND metric.label.status_class=\"5xx\"",
                    "aggregation": {
                      "alignmentPeriod": "300s",
                      "perSeriesAligner": "ALIGN_DELTA",
                      "crossSeriesReducer": "REDUCE_SUM"
                    }
                  }
                }
              }
            }
          },
          {
            "xPos": 4,
            "yPos": 0,
            "width": 2,
            "height": 2,
            "widget": {
              "title": "Allocate P50",
              "visibilityCondition": {
                "templateVariableCondition": {
                  "templateVariable": "latency_percentile",
                  "templateVariableValue": "50",
                  "comparator": "REGEX_FULL_MATCH"
                }
              },
              "scorecard": {
                "timeSeriesQuery": {
                  "timeSeriesFilter": {
                    "filter": "metric.type=\"workload.googleapis.com/control_plane.endpoint.request.duration\" AND metric.label.service_name=\"control-plane\" AND metric.label.route=\"/api/v1/runners/allocate\"",
