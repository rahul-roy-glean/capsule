repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -l -w
        language: system
        types: [go]

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        types: [go]
        pass_filenames: false

      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test -count=1 ./pkg/... ./cmd/...
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]

      - id: migration-guard
        name: migration guard
        entry: bash .github/scripts/check-migrations.sh --staged
        language: system
        files: ^(cmd/capsule-control-plane/migrations/|cmd/capsule-control-plane/schema\.sql|\.github/scripts/check-migrations\.sh)
        pass_filenames: false

      - id: sdk-python-ruff
        name: sdk python ruff
        entry: >-
          bash -lc 'cd sdk/python &&
          [ -x .venv/bin/python ] || {
          echo "missing sdk/python/.venv; run: cd sdk/python && python3 -m venv .venv && . .venv/bin/activate && pip install -e \".[dev]\"";
          exit 1; };
          export VIRTUAL_ENV="$PWD/.venv";
          export PATH="$VIRTUAL_ENV/bin:$PATH";
          .venv/bin/python -m ruff check src/capsule_sdk/ tests/'
        language: system
        files: ^sdk/python/
        pass_filenames: false

      - id: sdk-python-pyright
        name: sdk python pyright
        entry: >-
          bash -lc 'cd sdk/python &&
          [ -x .venv/bin/python ] || {
          echo "missing sdk/python/.venv; run: cd sdk/python && python3 -m venv .venv && . .venv/bin/activate && pip install -e \".[dev]\"";
          exit 1; };
          export VIRTUAL_ENV="$PWD/.venv";
          export PATH="$VIRTUAL_ENV/bin:$PATH";
          .venv/bin/python -m pyright src/capsule_sdk/'
        language: system
        files: ^sdk/python/
        pass_filenames: false

      - id: sdk-python-pytest
        name: sdk python pytest
        entry: >-
          bash -lc 'cd sdk/python &&
          [ -x .venv/bin/python ] || {
          echo "missing sdk/python/.venv; run: cd sdk/python && python3 -m venv .venv && . .venv/bin/activate && pip install -e \".[dev]\"";
          exit 1; };
          export VIRTUAL_ENV="$PWD/.venv";
          export PATH="$VIRTUAL_ENV/bin:$PATH";
          .venv/bin/python -m pytest tests/ -v --ignore=tests/e2e_live.py -m "not contract"'
        language: system
        files: ^sdk/python/
        pass_filenames: false
        stages: [pre-push]
