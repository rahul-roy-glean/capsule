# Lima VM definition for local Firecracker development.
# Usage: limactl start ./dev/lima.yaml --name=fc-dev --tty=false
#
# IMPORTANT: Firecracker requires KVM. This works on:
#   - x86_64 Linux hosts (native KVM)
#   - x86_64 macOS with Lima (QEMU + HVF can expose KVM in some configs)
#   - Apple Silicon Macs: KVM is NOT available in Lima VMs. The VM will
#     provision correctly but Firecracker cannot start microVMs without KVM.
#     Use a remote x86_64 Linux machine or GCE instance instead.

# Lean VM: 4 vCPU, 4GiB RAM, 20GiB disk.
# We run tiny 1-vCPU microVMs inside, so this is plenty.
cpus: 4
memory: 4GiB
disk: 20GiB

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

# Writable mount — code edits on Mac are visible instantly inside VM.
mounts:
  - location: "~"
    writable: true

# Forward control-plane and firecracker-manager HTTP ports to macOS.
portForwards:
  - guestPort: 8080
    hostPort: 8080
  - guestPort: 9080
    hostPort: 9080

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux

      export DEBIAN_FRONTEND=noninteractive

      ARCH=$(uname -m)  # x86_64 or aarch64

      # --- Core packages ---
      apt-get update
      apt-get install -y --no-install-recommends \
        ca-certificates curl wget gnupg lsb-release \
        e2fsprogs qemu-utils \
        bridge-utils iptables iproute2 \
        jq git make build-essential \
        docker.io docker-buildx \
        postgresql postgresql-client

      # --- Go 1.24 ---
      GO_VERSION=1.24.0
      if [ ! -d /usr/local/go ]; then
        case "$ARCH" in
          x86_64)  GO_ARCH=amd64 ;;
          aarch64) GO_ARCH=arm64 ;;
          *)       GO_ARCH=amd64 ;;
        esac
        curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-${GO_ARCH}.tar.gz" | tar -C /usr/local -xzf -
      fi
      echo 'export PATH=/usr/local/go/bin:$PATH' > /etc/profile.d/golang.sh

      # --- Firecracker 1.14.1 ---
      FC_VERSION=1.14.1
      if [ ! -f /usr/local/bin/firecracker ]; then
        # Firecracker release archives use x86_64/aarch64
        curl -fsSL "https://github.com/firecracker-microvm/firecracker/releases/download/v${FC_VERSION}/firecracker-v${FC_VERSION}-${ARCH}.tgz" \
          -o /tmp/fc.tgz
        tar -xzf /tmp/fc.tgz -C /tmp
        mv "/tmp/release-v${FC_VERSION}-${ARCH}/firecracker-v${FC_VERSION}-${ARCH}" /usr/local/bin/firecracker
        mv "/tmp/release-v${FC_VERSION}-${ARCH}/jailer-v${FC_VERSION}-${ARCH}" /usr/local/bin/jailer
        chmod +x /usr/local/bin/firecracker /usr/local/bin/jailer
        rm -rf /tmp/fc.tgz /tmp/release-*
      fi

      # --- KVM permissions ---
      if [ -e /dev/kvm ]; then
        chmod 666 /dev/kvm
        echo "KVM is available"
      else
        echo "WARNING: /dev/kvm not found. Firecracker microVMs will NOT work."
        echo "This is expected on Apple Silicon Macs (no KVM in Lima VMs)."
        echo "Use a Linux host with KVM for full functionality."
      fi

      # --- Networking ---
      sysctl -w net.ipv4.ip_forward=1
      echo 'net.ipv4.ip_forward=1' > /etc/sysctl.d/99-ip-forward.conf

      # --- Postgres: create dev database ---
      systemctl enable postgresql
      systemctl start postgresql
      su - postgres -c "psql -tc \"SELECT 1 FROM pg_database WHERE datname='firecracker_runner'\" | grep -q 1 || psql -c 'CREATE DATABASE firecracker_runner'"
      # Allow local connections without password
      PG_HBA=$(su - postgres -c "psql -t -A -c 'SHOW hba_file'")
      if ! grep -q 'local.*all.*all.*trust' "$PG_HBA" 2>/dev/null; then
        sed -i 's/^local\s\+all\s\+all\s\+peer/local   all   all   trust/' "$PG_HBA"
        # Also allow TCP connections from localhost without password
        sed -i 's/^host\s\+all\s\+all\s\+127.0.0.1\/32\s\+\(scram-sha-256\|md5\)/host    all   all   127.0.0.1\/32   trust/' "$PG_HBA"
        systemctl reload postgresql
      fi

      # --- Docker: allow lima user ---
      usermod -aG docker "${LIMA_CIDATA_USER:-$(id -un 1000)}" 2>/dev/null || true

      # --- Dev directories ---
      # Bind-mount /tmp/fc-dev so firecracker-manager's waitForDataMount sees
      # it as a mount point in /proc/mounts. Data persists across reboots since
      # it's on the real filesystem (not tmpfs).
      mkdir -p /tmp/fc-dev
      if ! mountpoint -q /tmp/fc-dev; then
        mount --bind /tmp/fc-dev /tmp/fc-dev
      fi
      mkdir -p /tmp/fc-dev/{snapshots/overlays,sockets,logs,workspaces,pids}
      chmod -R 777 /tmp/fc-dev
