platform:
  gcp_project: "my-project"
  region: "us-central1"
  zone: "us-central1-a"

microvm:
  vcpus: 2
  memory_mb: 1024           # Small footprint per function instance
  max_per_host: 64          # High density on each host
  idle_target: 10           # Large warm pool for low cold-start latency

hosts:
  machine_type: "n2-standard-64"
  min_count: 2
  max_count: 20
  data_disk_gb: 200

workload:
  # Docker image with your function runtime (Node.js, Python, Go, etc.).
  # The platform converts it to a Firecracker rootfs and installs thaw-agent.
  base_image: "us-docker.pkg.dev/my-project/images/function-runtime:latest"

  layers:
    - name: "runtime"
      init_commands:
        - type: "shell"
          args: ["npm", "install", "--prefix", "/app"]
        - type: "shell"
          # Start the runtime once so module loading is baked into the snapshot.
          # The warm-up script starts the server, runs a health check, and exits.
          args: ["bash", "/app/scripts/warm-runtime.sh"]

  # The function runtime that handles incoming invocations.
  start_command:
    command: ["/app/function-runtime", "--handler=handler.main", "--port=3000"]
    port: 3000
    health_path: "/ready"

# No session persistence for stateless functions: after the function returns,
# TryRecycle pauses the VM back into the local pool (~50ms) for the next
# invocation. Cross-host GCS sessions are not needed unless you need
# long-lived function state (uncommon).
# session:
#   enabled: false

credentials:
  secrets: []
  host_dirs: []
  env: {}
