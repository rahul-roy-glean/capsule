platform:
  gcp_project: "my-project"
  region: "us-central1"
  zone: "us-central1-a"

microvm:
  vcpus: 4
  memory_mb: 8192
  max_per_host: 16
  idle_target: 2            # Pre-warm 2 VMs per host from the golden snapshot

hosts:
  machine_type: "n2-standard-64"
  min_count: 2
  max_count: 20
  data_disk_gb: 500

workload:
  # Docker image converted to Firecracker rootfs at snapshot-build time.
  # The platform installs thaw-agent, systemd, and networking automatically.
  # Use any image: ubuntu, your own CI image from Artifact Registry, etc.
  base_image: "us-docker.pkg.dev/my-project/images/ci-runner:latest"

  layers:
    # Layer 1: Clone repo and fetch Bazel dependencies
    - name: "workspace"
      init_commands:
        - type: "shell"
          args: ["bash", "-c", "git clone --depth=1 -b main https://github.com/myorg/myrepo /workspace"]
        - type: "gcp-auth"
          args: ["my-sa@my-project.iam.gserviceaccount.com"]
        - type: "shell"
          args: ["bazel", "fetch", "//..."]
      refresh_interval: "on_push"

  # GitHub Actions runner registration runs at boot via start_command.
  # ${CI_RUNNER_TOKEN} is injected by the control-plane via MMDS at allocation time.
  start_command:
    command: ["/home/runner/config.sh", "--url", "https://github.com/myorg/myrepo", "--token", "${CI_RUNNER_TOKEN}", "--ephemeral", "--unattended", "--labels", "self-hosted,firecracker,bazel"]
    env:
      CI_RUNNER_TOKEN: "${ci_runner_token}"
    run_as: "runner"

  config:
    # Optional: drives declared here are created by snapshot-builder and attached to every VM.
    # workspace_size_gb: 50
    # drives:
    #   - drive_id: "bazel_cache"
    #     label: "BAZEL_CACHE"
    #     size_gb: 20
    #     read_only: true
    #     mount_path: "/mnt/bazel-cache"
    #     commands:
    #       - type: "shell"
    #         args: ["bazel", "fetch", "//..."]

# Pool reuse: after a job finishes, TryRecycle pauses the VM back into the
# local pool. The next job with the same WorkloadKey resumes it in ~10ms
# with the Bazel server still warm.

credentials:
  secrets: []
  host_dirs: []
  env: {}
